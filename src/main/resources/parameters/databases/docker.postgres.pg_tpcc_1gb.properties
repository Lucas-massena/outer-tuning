# ======================================================= DOCKER POSTGRESQL TPC-C =======================================================
# Configuração para o container PostgreSQL com workload TPC-C (HammerDB).
# Para usar: copie o conteúdo deste arquivo sobre o database.properties ativo.
sgbd=postgresql
databaseName=tpcc
# POSTGRESQL
driverSGBD=org.postgresql.Driver
urlSGBD=jdbc:postgresql://postgres:5432/
userSGBD=postgres
pwdSGBD=postgres
# ======================================================= TUNING OPTIONS =======================================================
# Materialized Views
thresholdpostgresql=1
# Tamanho da pagina do banco de dados
pagesizepostgresql=8192
# Tamanho do espaco maximo para uso dos agentes de tuning em GigaBytes (GB)
sizespacetotuningpostgresql=10
# Fator de preenchimento do banco
fillfactorypostgresql=2
# Informacoes para calculo do custo da consulta no postgres
seq_page_costpostgresql=1.0
cpu_tuple_costpostgresql=0.01
# ======================================================= AI KEYS =======================================================
gptApiKey=
geminiApiKey=
claudeApiKey=
